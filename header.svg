<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="220" viewBox="0 0 1200 220">
  <defs>
    <radialGradient id="glow-blue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6E78FF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#6E78FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-pink" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E64298" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#E64298" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-purple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9c5cb4" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#9c5cb4" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect width="100%" height="100%" fill="#0d1117"/>

  <!-- connection lines between particles -->
  <g stroke-linecap="round">
    <line x1="120" y1="45" x2="230" y2="78" stroke="#6E78FF" stroke-opacity="0.12" stroke-width="1"/>
    <line x1="230" y1="78" x2="310" y2="42" stroke="#6E78FF" stroke-opacity="0.08" stroke-width="1"/>
    <line x1="310" y1="42" x2="420" y2="95" stroke="#6E78FF" stroke-opacity="0.10" stroke-width="1"/>
    <line x1="85" y1="130" x2="120" y2="45" stroke="#6E78FF" stroke-opacity="0.06" stroke-width="1"/>
    <line x1="85" y1="130" x2="230" y2="78" stroke="#6E78FF" stroke-opacity="0.09" stroke-width="1"/>
    <line x1="180" y1="170" x2="85" y2="130" stroke="#6E78FF" stroke-opacity="0.07" stroke-width="1"/>
    <line x1="180" y1="170" x2="310" y2="190" stroke="#6E78FF" stroke-opacity="0.10" stroke-width="1"/>
    <line x1="310" y1="190" x2="420" y2="95" stroke="#6E78FF" stroke-opacity="0.06" stroke-width="1"/>
    <line x1="750" y1="35" x2="870" y2="68" stroke="#6E78FF" stroke-opacity="0.11" stroke-width="1"/>
    <line x1="870" y1="68" x2="960" y2="30" stroke="#6E78FF" stroke-opacity="0.08" stroke-width="1"/>
    <line x1="960" y1="30" x2="1080" y2="72" stroke="#6E78FF" stroke-opacity="0.10" stroke-width="1"/>
    <line x1="1080" y1="72" x2="1150" y2="40" stroke="#6E78FF" stroke-opacity="0.07" stroke-width="1"/>
    <line x1="780" y1="155" x2="870" y2="68" stroke="#6E78FF" stroke-opacity="0.06" stroke-width="1"/>
    <line x1="780" y1="155" x2="900" y2="180" stroke="#6E78FF" stroke-opacity="0.09" stroke-width="1"/>
    <line x1="900" y1="180" x2="1020" y2="160" stroke="#6E78FF" stroke-opacity="0.08" stroke-width="1"/>
    <line x1="1020" y1="160" x2="1080" y2="72" stroke="#6E78FF" stroke-opacity="0.07" stroke-width="1"/>
    <line x1="1020" y1="160" x2="1140" y2="185" stroke="#6E78FF" stroke-opacity="0.10" stroke-width="1"/>
    <line x1="50" y1="200" x2="180" y2="170" stroke="#6E78FF" stroke-opacity="0.05" stroke-width="1"/>
    <line x1="420" y1="95" x2="520" y2="55" stroke="#6E78FF" stroke-opacity="0.07" stroke-width="1"/>
    <line x1="520" y1="55" x2="650" y2="88" stroke="#6E78FF" stroke-opacity="0.06" stroke-width="1"/>
    <line x1="650" y1="88" x2="750" y2="35" stroke="#6E78FF" stroke-opacity="0.08" stroke-width="1"/>
    <line x1="520" y1="55" x2="480" y2="150" stroke="#6E78FF" stroke-opacity="0.05" stroke-width="1"/>
    <line x1="650" y1="88" x2="700" y2="175" stroke="#6E78FF" stroke-opacity="0.07" stroke-width="1"/>
    <line x1="700" y1="175" x2="780" y2="155" stroke="#6E78FF" stroke-opacity="0.09" stroke-width="1"/>
    <line x1="480" y1="150" x2="700" y2="175" stroke="#6E78FF" stroke-opacity="0.04" stroke-width="1"/>
  </g>

  <!-- particles with glow - scattered across the banner -->
  <g filter="url(#soft-glow)">
    <!-- left cluster -->
    <circle cx="120" cy="45" r="2.5" fill="url(#glow-blue)"><animate attributeName="cy" values="45;40;45" dur="6s" repeatCount="indefinite"/></circle>
    <circle cx="230" cy="78" r="2" fill="url(#glow-blue)"><animate attributeName="cy" values="78;83;78" dur="7s" repeatCount="indefinite"/></circle>
    <circle cx="310" cy="42" r="1.8" fill="url(#glow-pink)"><animate attributeName="cy" values="42;37;42" dur="8s" repeatCount="indefinite"/></circle>
    <circle cx="85" cy="130" r="2.2" fill="url(#glow-blue)"><animate attributeName="cx" values="85;90;85" dur="9s" repeatCount="indefinite"/></circle>
    <circle cx="180" cy="170" r="1.5" fill="url(#glow-purple)"><animate attributeName="cy" values="170;175;170" dur="5s" repeatCount="indefinite"/></circle>
    <circle cx="420" cy="95" r="2" fill="url(#glow-blue)"><animate attributeName="cy" values="95;90;95" dur="7.5s" repeatCount="indefinite"/></circle>
    <circle cx="310" cy="190" r="1.8" fill="url(#glow-blue)"><animate attributeName="cx" values="310;315;310" dur="6.5s" repeatCount="indefinite"/></circle>
    <circle cx="50" cy="200" r="1.5" fill="url(#glow-blue)"><animate attributeName="cy" values="200;195;200" dur="8s" repeatCount="indefinite"/></circle>

    <!-- middle -->
    <circle cx="520" cy="55" r="1.8" fill="url(#glow-blue)"><animate attributeName="cy" values="55;50;55" dur="6s" repeatCount="indefinite"/></circle>
    <circle cx="650" cy="88" r="2" fill="url(#glow-pink)"><animate attributeName="cy" values="88;93;88" dur="7s" repeatCount="indefinite"/></circle>
    <circle cx="480" cy="150" r="1.5" fill="url(#glow-blue)"><animate attributeName="cx" values="480;485;480" dur="8.5s" repeatCount="indefinite"/></circle>
    <circle cx="700" cy="175" r="2.2" fill="url(#glow-purple)"><animate attributeName="cy" values="175;170;175" dur="5.5s" repeatCount="indefinite"/></circle>

    <!-- right cluster -->
    <circle cx="750" cy="35" r="2" fill="url(#glow-blue)"><animate attributeName="cy" values="35;30;35" dur="7s" repeatCount="indefinite"/></circle>
    <circle cx="870" cy="68" r="2.5" fill="url(#glow-blue)"><animate attributeName="cy" values="68;73;68" dur="6s" repeatCount="indefinite"/></circle>
    <circle cx="960" cy="30" r="1.8" fill="url(#glow-pink)"><animate attributeName="cy" values="30;25;30" dur="8s" repeatCount="indefinite"/></circle>
    <circle cx="1080" cy="72" r="2" fill="url(#glow-blue)"><animate attributeName="cx" values="1080;1085;1080" dur="7.5s" repeatCount="indefinite"/></circle>
    <circle cx="1150" cy="40" r="1.5" fill="url(#glow-blue)"><animate attributeName="cy" values="40;35;40" dur="5s" repeatCount="indefinite"/></circle>
    <circle cx="780" cy="155" r="2.2" fill="url(#glow-blue)"><animate attributeName="cy" values="155;160;155" dur="9s" repeatCount="indefinite"/></circle>
    <circle cx="900" cy="180" r="1.8" fill="url(#glow-purple)"><animate attributeName="cx" values="900;905;900" dur="6.5s" repeatCount="indefinite"/></circle>
    <circle cx="1020" cy="160" r="2" fill="url(#glow-blue)"><animate attributeName="cy" values="160;155;160" dur="7s" repeatCount="indefinite"/></circle>
    <circle cx="1140" cy="185" r="1.5" fill="url(#glow-pink)"><animate attributeName="cy" values="185;190;185" dur="8s" repeatCount="indefinite"/></circle>
  </g>

  <!-- name -->
  <text x="600" y="95" text-anchor="middle" fill="#FFFFFF" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="700" letter-spacing="1">Anton Chepaldin</text>

  <!-- tagline -->
  <text x="600" y="130" text-anchor="middle" fill="#c9d1d9" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="400" letter-spacing="0.5">AI, systems and human behaviour</text>
</svg>
